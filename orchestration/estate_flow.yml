id: estate_pipeline
namespace: estate_pipe
description: "UK Land Registry Price Paid Data ELT Pipeline"

variables:
  csv_url: "http://prod.publicdata.landregistry.gov.uk.s3-website-eu-west-1.amazonaws.com/pp-monthly-update-new-version.csv"
  db_user: "estate_user"
  db_password: "estate_password"
  db_host: "pgdatabase"
  db_port: "5432"
  db_name: "estate_db"

tasks:
  # ==========================================
  # TASK 1: INGESTION (DLT)
  # ==========================================
  - id: run_ingestion
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: estate-worker:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: estate-pipe_default
      pullPolicy: NEVER
      volumes:
        - estate_code:/app
    env:
      CSV_URL: "{{ vars.csv_url }}"
      DESTINATION__POSTGRES__CREDENTIALS: "postgresql://{{ vars.db_user }}:{{ vars.db_password }}@{{ vars.db_host }}:{{ vars.db_port }}/{{ vars.db_name }}"
    commands:
      - echo "=== INGESTION START ==="
      - cd /app
      - python3 ingestion/extract_estate.py

  # ==========================================
  # TASK 2: TRANSFORMATION (PYSPARK)
  # ==========================================
  - id: run_transformation
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: estate-worker:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: estate-pipe_default
      pullPolicy: NEVER
      volumes:
        - estate_code:/app
    env:
      DB_URL: "jdbc:postgresql://{{ vars.db_host }}:{{ vars.db_port }}/{{ vars.db_name }}"
      DB_USER: "{{ vars.db_user }}"
      DB_PASSWORD: "{{ vars.db_password }}"
      DB_HOST: "{{ vars.db_host }}"
      DB_PORT: "{{ vars.db_port }}"
      DB_NAME: "{{ vars.db_name }}"
      PYSPARK_SUBMIT_ARGS: "--driver-memory 1g pyspark-shell"
    commands:
      - echo "=== TRANSFORMATION START ==="
      - cd /app
      - python3 transform/process_estate.py

  # ==========================================
  # TASK 3: DATA QUALITY (GREAT EXPECTATIONS)
  # ==========================================
  - id: run_quality_checks
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: estate-worker:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: estate-pipe_default
      pullPolicy: NEVER

    env:
      GX_DB_URL: "postgresql+psycopg2://{{ vars.db_user }}:{{ vars.db_password }}@{{ vars.db_host }}:{{ vars.db_port }}/{{ vars.db_name }}"
    commands:
      - echo "=== DATA QUALITY START ==="
      - cd /app
      - python3 quality/validate_estate.py

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"